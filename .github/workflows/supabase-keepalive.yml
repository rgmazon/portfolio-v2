name: Supabase keepalive

on:
  schedule:
    # Every 3 days, well under Supabase's 7-day free-tier pause threshold
    - cron: "0 6 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_URL or SUPABASE_ANON_KEY secret is empty/unset. Check Settings > Secrets and variables > Actions > Secrets (not Variables)."
            exit 1
          fi
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/projects?select=slug&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Response status: $status"
          if [ "$status" -ge 300 ]; then
            echo "Keepalive request failed with status $status"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
